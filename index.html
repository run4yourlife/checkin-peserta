<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHECK-IN PESERTA</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#06152d;
color:white;
padding:20px;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:100%;
max-width:600px;
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
font-size:32px;
color:#f6c453;
margin-bottom:10px;
font-weight:700;
}

.header p{
color:#d6d6d6;
font-size:15px;
}

.card{
background:#0d2347;
border-radius:28px;
padding:28px;
box-shadow:0 0 40px rgba(0,0,0,0.35);
}

.input-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:10px;
font-size:15px;
font-weight:600;
color:#f6c453;
}

input,
select{

width:100%;
padding:18px 20px;

border:none;
border-radius:18px;

background:#132f5e;
color:white;

font-size:16px;
outline:none;

transition:0.3s;

}

input:focus,
select:focus{

background:#17386f;

box-shadow:
0 0 0 3px rgba(246,196,83,0.25);

}

input::placeholder{
color:#9db0d3;
}

button{

width:100%;
padding:18px;

border:none;
border-radius:18px;

background:#f6c453;
color:#06152d;

font-size:18px;
font-weight:700;

cursor:pointer;

transition:0.3s;

}

button:hover{
transform:scale(1.01);
}

button:active{
transform:scale(0.99);
}

.loading{
display:none;
margin-top:22px;
text-align:center;
color:#f6c453;
font-size:15px;
font-weight:500;
}

.result{
display:none;
margin-top:22px;
padding:22px;
border-radius:20px;
line-height:2;
animation:fadeIn 0.3s ease;
}

.success{
background:#10391e;
border:2px solid #27d46b;
}

.warning{
background:#4a3200;
border:2px solid #ffb300;
}

.error{
background:#4a1111;
border:2px solid #ff4d4d;
}

.badge{
display:inline-block;
padding:8px 16px;
border-radius:999px;
font-size:13px;
font-weight:700;
margin-top:10px;
}

.badge-success{
background:#27d46b;
color:#06152d;
}

.badge-warning{
background:#ffb300;
color:#06152d;
}

.badge-error{
background:#ff4d4d;
color:white;
}

.info{
margin-top:18px;
line-height:2;
font-size:15px;
}

.info b{
color:#f6c453;
}

.footer{
margin-top:25px;
text-align:center;
font-size:13px;
color:#9db0d3;
line-height:1.8;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@media(max-width:768px){

body{
padding:15px;
}

.header h1{
font-size:26px;
}

.card{
padding:22px;
}

button{
font-size:16px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>🏃 CHECK-IN PESERTA</h1>

<p>
RUN FOR YOUR LIFE 2026
</p>

</div>

<div class="card">

<!-- JENIS CHECK-IN -->

<div class="input-group">

<label>
Jenis Check-In
</label>

<select id="checkinType">

<option value="rpc">
🎽 AMBIL RPC
</option>

<option value="race">
🏃 RACE DAY
</option>

</select>

</div>

<!-- INPUT -->

<div class="input-group">

<label>
Register ID atau Nomor BIB
</label>

<input
type="text"
id="inputCheckin"
placeholder="Contoh : RFYL26-5K-M0001 atau F 3003"
autocomplete="off"
>

</div>

<!-- BUTTON -->

<button onclick="checkinPeserta()">

✅ CHECK-IN SEKARANG

</button>

<!-- LOADING -->

<div
class="loading"
id="loading"
>

⏳ Memproses check-in peserta...

</div>

<!-- RESULT -->

<div
class="result"
id="resultBox"
>

<div id="resultContent"></div>

</div>

<!-- FOOTER -->

<div class="footer">

Peserta dapat melakukan check-in maksimal 2x :
<br>
1x Ambil RPC & 1x Race Day

</div>

</div>

</div>

<script>

// ======================================
// WEB APP URL
// ======================================

const WEBAPP_URL =
"https://script.google.com/macros/s/AKfycbwr5NReGwYtYWt7hvx4Kw_LwAEZ2d0hVj3WGUPxfYzDXfFO8tno8w-PBO026at7ZNAcaw/exec";

// ======================================
// AUDIO
// ======================================

const successSound =
new Audio(
"https://actions.google.com/sounds/v1/cartoon/pop.ogg"
);

const warningSound =
new Audio(
"https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
);

// ======================================
// ENTER SUBMIT
// ======================================

document
.getElementById("inputCheckin")
.addEventListener("keypress",function(e){

if(e.key === "Enter"){

checkinPeserta();

}

});

// ======================================
// SHOW RESULT
// ======================================

function showResult(type,html){

const box =
document.getElementById("resultBox");

box.style.display = "block";

box.className =
`result ${type}`;

document.getElementById("resultContent")
.innerHTML = html;

}

// ======================================
// CHECK-IN
// ======================================

async function checkinPeserta(){

const input =

document.getElementById("inputCheckin")
.value
.trim();

const checkinType =

document.getElementById("checkinType")
.value;

if(!input){

warningSound.currentTime = 0;
warningSound.play();

alert(
"Masukkan Register ID atau Nomor BIB"
);

return;

}

document.getElementById("loading")
.style.display = "block";

document.getElementById("resultBox")
.style.display = "none";

try{

const response =
await fetch(WEBAPP_URL,{

method:"POST",

headers:{
"Content-Type":"text/plain;charset=utf-8"
},

body:JSON.stringify({

action:"checkin",

type:checkinType,

registerId:input,

bib:input

})

});

const res =
await response.json();

document.getElementById("loading")
.style.display = "none";

// ====================================
// SUCCESS RPC
// ====================================

if(res.status == "success_rpc"){

successSound.currentTime = 0;
successSound.play();

showResult(
"success",
`

<h2>🎽 PESERTA SUDAH AMBIL RPC</h2>

<div class="badge badge-success">
RPC BERHASIL
</div>

<div class="info">

<b>Nama :</b>
${res.nama}<br>

<b>BIB :</b>
${res.bib}<br>

<b>Kategori :</b>
${res.kategori}<br>

<b>Register ID :</b>
${res.registerId}

</div>

`
);

}

// ====================================
// SUCCESS RACE
// ====================================

else if(res.status == "success_race"){

successSound.currentTime = 0;
successSound.play();

showResult(
"success",
`

<h2>🏃 PESERTA BERHASIL CHECK-IN RACE</h2>

<div class="badge badge-success">
CHECK-IN BERHASIL
</div>

<div class="info">

<b>Nama :</b>
${res.nama}<br>

<b>BIB :</b>
${res.bib}<br>

<b>Kategori :</b>
${res.kategori}<br>

<b>Register ID :</b>
${res.registerId}

</div>

`
);

}

// ====================================
// ALREADY RPC
// ====================================

else if(res.status == "already_rpc"){

warningSound.currentTime = 0;
warningSound.play();

showResult(
"warning",
`

<h2>⚠️ PESERTA SUDAH AMBIL RPC</h2>

<div class="badge badge-warning">
RPC SUDAH TERAMBIL
</div>

<div class="info">

<b>Nama :</b>
${res.nama}<br>

<b>BIB :</b>
${res.bib}<br>

<b>Register ID :</b>
${res.registerId}

</div>

`
);

}

// ====================================
// ALREADY RACE
// ====================================

else if(res.status == "already_race"){

warningSound.currentTime = 0;
warningSound.play();

showResult(
"warning",
`

<h2>⚠️ PESERTA SUDAH CHECK-IN RACE</h2>

<div class="badge badge-warning">
DOUBLE CHECK-IN
</div>

<div class="info">

<b>Nama :</b>
${res.nama}<br>

<b>BIB :</b>
${res.bib}<br>

<b>Register ID :</b>
${res.registerId}

</div>

`
);

}

// ====================================
// NOT FOUND
// ====================================

else{

warningSound.currentTime = 0;
warningSound.play();

showResult(
"error",
`

<h2>❌ DATA TIDAK DITEMUKAN</h2>

<div class="badge badge-error">
PESERTA TIDAK VALID
</div>

<div class="info">

Data peserta tidak ditemukan.<br>
Periksa kembali Register ID atau Nomor BIB.

</div>

`
);

}

}catch(err){

document.getElementById("loading")
.style.display = "none";

warningSound.currentTime = 0;
warningSound.play();

showResult(
"error",
`

<h2>❌ ERROR</h2>

<div class="badge badge-error">
TERJADI KESALAHAN
</div>

<div class="info">

${err.message}

</div>

`
);

}

}

</script>

</body>
</html>
